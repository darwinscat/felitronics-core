# SPDX-License-Identifier: AGPL-3.0-or-later
name: ci

on:
  push:
    branches: [ main, "feat/**" ]
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v7   # v5 runs on Node 24 (v4 is pinned to the deprecated Node 20)
      - name: Configure (JUCE-free; no external deps)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DFELITRONICS_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release -j   # --config is required by multi-config gens (VS on Windows)
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure   # -C likewise (no-op on single-config)

  # Dedicated ASan + UBSan job. UBSan makes platform-divergent UB LOUD on x86-64 (integer /0, signed
  # overflow, OOB shift, null store) that is SILENT on the dev machine (Apple-Silicon ARM64) — the exact
  # class that let an unprepared-engine divide-by-zero ship and only surface as a Windows crash. Separate
  # job (Linux/Clang-specific flags) rather than a 4th OS-matrix row.
  sanitizers:
    name: ubuntu-clang-asan-ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure (ASan + UBSan, hard-fail on any UB)
        run: >
          cmake -S . -B build-san
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_CXX_COMPILER=clang++
          -DFELITRONICS_BUILD_TESTS=ON
          -DFELITRONICS_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build-san -j
      - name: Test
        env:
          # LSan (Linux-only; macOS has no LeakSanitizer) → this job is where leaks fail the build. It caught
          # a real one: NeuralStage held its live model as a raw pointer with no destructor, leaking it on
          # teardown — now fixed (~NeuralStage frees it; a ctors==dtors test guards it on every platform).
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1:strict_string_checks=1:detect_stack_use_after_return=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-san --output-on-failure
