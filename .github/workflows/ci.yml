# SPDX-License-Identifier: AGPL-3.0-or-later
name: ci

on:
  push:
    branches: [ main, "feat/**" ]
  pull_request:
  workflow_dispatch:   # manual run (e.g. to seed/refresh the quality-report branch)

jobs:
  build-test:
    name: ${{ matrix.os }} pffft=${{ matrix.pffft }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:          # 3x default (OFF) proves the header-only path on every OS; 2x ON proves the
          - { os: ubuntu-latest,  pffft: OFF }   #   compiled pffft backend on the two SIMD arches we ship:
          - { os: macos-latest,   pffft: OFF }   #   x86-64/SSE (ubuntu) + arm64/NEON (macos). The cross-backend
          - { os: windows-latest, pffft: OFF }   #   NULL suite runs only on the ON rows.
          - { os: ubuntu-latest,  pffft: ON }
          - { os: macos-latest,   pffft: ON }
          # windows-latest + pffft ON is a fast-follow (pending a first green MSVC-pffft run); the OFF row
          # already proves the core compiles + tests on Windows.
    steps:
      - uses: actions/checkout@v7   # v5 runs on Node 24 (v4 is pinned to the deprecated Node 20)
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DFELITRONICS_BUILD_TESTS=ON -DFELITRONICS_WITH_PFFFT=${{ matrix.pffft }}
      - name: Build
        run: cmake --build build --config Release -j   # --config is required by multi-config gens (VS on Windows)
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure   # -C likewise (no-op on single-config)

  # Dedicated ASan + UBSan job. UBSan makes platform-divergent UB LOUD on x86-64 (integer /0, signed
  # overflow, OOB shift, null store) that is SILENT on the dev machine (Apple-Silicon ARM64) — the exact
  # class that let an unprepared-engine divide-by-zero ship and only surface as a Windows crash. Separate
  # job (Linux/Clang-specific flags) rather than a 4th OS-matrix row.
  sanitizers:
    name: ubuntu-clang-asan-ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure (ASan + UBSan, hard-fail on any UB)
        run: >
          cmake -S . -B build-san
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_C_COMPILER=clang
          -DFELITRONICS_BUILD_TESTS=ON
          -DFELITRONICS_ENABLE_SANITIZERS=ON
          -DFELITRONICS_WITH_PFFFT=ON
        # pffft ON here too, so the vendored C runs under ASan+UBSan. CMAKE_C_COMPILER=clang is REQUIRED: the
        # sanitizer runtime is clang's (CXX=clang++), and a gcc-compiled pffft.c would link the wrong ASan.
      - name: Build
        run: cmake --build build-san -j
      - name: Test
        env:
          # LSan (Linux-only; macOS has no LeakSanitizer) → this job is where leaks fail the build. It caught
          # a real one: NeuralStage held its live model as a raw pointer with no destructor, leaking it on
          # teardown — now fixed (~NeuralStage frees it; a ctors==dtors test guards it on every platform).
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1:strict_string_checks=1:detect_stack_use_after_return=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-san --output-on-failure

  # eqviz — renders the per-filter PNG quality maps (digital vs independent analog references) and
  # uploads them as a PR artifact, so a reviewer SEES filter quality instead of trusting their ears.
  # Fails only on crash / unstable-or-non-finite designs (black cells); colour judgement stays human.
  eqviz:
    name: eqviz-quality-pictures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DFELITRONICS_BUILD_TESTS=OFF
      - name: Build eqviz
        run: cmake --build build -j --target eqviz
      - name: Render quality maps
        run: mkdir -p eqviz-out && ./build/tools/eqviz eqviz-out --fs 44100,48000,96000,192000
      - uses: actions/upload-artifact@v4
        with:
          name: eqviz-quality-pictures
          path: eqviz-out/
          if-no-files-found: error

  # Publishes the EQ Filter Quality Atlas: renders the eqviz maps for main and force-pushes them to
  # the orphan single-commit branch `quality-report` (history never accumulates), where GitHub renders
  # README.md with the images inline. The main README links to it.
  quality-atlas:
    name: publish-quality-atlas
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DFELITRONICS_BUILD_TESTS=OFF
      - name: Build eqviz
        run: cmake --build build -j --target eqviz
      - name: Render the atlas
        run: |
          mkdir -p atlas
          ./build/tools/eqviz atlas --fs 44100,48000,96000,192000
          { echo "<!-- auto-generated by the quality-atlas CI job; do not edit -->"
            echo ""
            cat atlas/index.md
            echo ""
            echo "---"
            echo "Generated from \`${GITHUB_SHA}\` on $(date -u +%Y-%m-%d) by [tools/eqviz](https://github.com/${GITHUB_REPOSITORY}/blob/main/tools/eqviz/eqviz.cpp)."
          } > atlas/README.md
          rm atlas/index.md
      - name: Publish to the quality-report branch (orphan, force-pushed)
        run: |
          cd atlas
          git init -b quality-report
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "EQ Filter Quality Atlas for ${GITHUB_SHA}"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git" quality-report
